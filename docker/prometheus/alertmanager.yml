global:
  resolve_timeout: 5m

route:
  receiver: "discord"
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  routes:
    - match:
        severity: critical
      receiver: "discord"
      repeat_interval: 30m

receivers:
  - name: "discord"
    webhook_configs:
      - url: "${DISCORD_WEBHOOK_URL}"
        send_resolved: true
        http_config: {}
        # Discord 웹훅은 Alertmanager JSON 포맷을 직접 파싱하지 않습니다.
        # 실제 운영 시 alertmanager-discord 프록시를 사용하거나
        # 아래처럼 max_alerts를 설정해 대량 알림을 방지하세요.
        max_alerts: 5

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["service"]
