global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "dropify"
    metrics_path: /actuator/prometheus
    scrape_interval: 10s
    scrape_timeout: 8s
    static_configs:
      - targets:
          - "host.docker.internal:8080"
    relabel_configs:
      - target_label: application
        replacement: dropify
